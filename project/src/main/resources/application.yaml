spring:
  application:
    name: Server

  datasource:
    url: jdbc:postgresql://postgres:5432/prog_eng_db
    username: user
    password: password

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    
  flyway:
    enabled: true
    baseline-on-migrate: true

  docker:
    compose:
      file: D:/IntelliJ IDEA/ProgEngineering/project/docker-compose.yml

server:
  port: 8081

logging:
  level:
    org:
      springframework:
        security: DEBUG
    flywaydb: DEBUG

