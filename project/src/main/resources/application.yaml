spring:
  application:
    name: Server

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/prog_eng_db}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null

server:
  port: 8081

logging:
  level:
    org:
      springframework:
        security: DEBUG
    flywaydb: DEBUG

centrifugo:
  url: ${CENTRIFUGO_URL:http://localhost:8000/api}
  api_key: ${CENTRIFUGO_API_KEY:my_api_key}