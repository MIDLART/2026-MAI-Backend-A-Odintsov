<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Книги — реальное время</title>
    <script src="https://unpkg.com/centrifuge@5.2.2/dist/centrifuge.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .new { background-color: #e8f5e9; }
    </style>
</head>
<body>
<h1>Список книг</h1>
<p>Новые книги появляются <strong>автоматически</strong> без перезагрузки</p>
<table id="books-table">
    <thead>
    <tr>
        <th>ID</th>
        <th>Название</th>
        <th>Авторы</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
    fetch('/books')
        .then(res => res.json())
        .then(books => books.forEach(book => addBookToTable(book)));

    function addBookToTable(book) {
        const tbody = document.querySelector('#books-table tbody');
        const row = tbody.insertRow(0);
        row.innerHTML = `
                <td>${book.id}</td>
                <td>${book.title}</td>
                <td>${book.authors ? book.authors.map(a => a.name).join(', ') : '-'}</td>
            `;
    }

    const centrifuge = new Centrifuge('ws://localhost:8000/connection/websocket');

    const sub = centrifuge.newSubscription('public:books');  // ← неймспейс public
    sub.on('publication', function(ctx) {
        addBookToTable(ctx.data);
    });
    sub.subscribe();

    centrifuge.connect();
</script>
</body>
</html>
