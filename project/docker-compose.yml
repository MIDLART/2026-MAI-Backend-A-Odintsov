services:
  postgres:
    image: postgres:17
    container_name: postgres_prog_eng
    environment:
      POSTGRES_DB: prog_eng_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d prog_eng_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  migrate:
    image: flyway/flyway:11-alpine
    command:
      - -url=jdbc:postgresql://postgres:5432/prog_eng_db
      - -user=user
      - -password=password
      - -connectRetries=60
      - migrate
    volumes:
      - ./src/main/resources/db/migration:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: centrifugo_prog_eng
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro
    command: centrifugo -c config.json
    restart: unless-stopped

  app:
    build: .
    container_name: spring_app_prog_eng
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/prog_eng_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      CENTRIFUGO_URL: http://centrifugo:8000/api
      CENTRIFUGO_API_KEY: my_api_key
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      centrifugo:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f 'java -jar app.jar' || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  nginx:
    image: nginx:1.29
    container_name: nginx_proxy_prog_eng
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "nginx", "-t" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data: